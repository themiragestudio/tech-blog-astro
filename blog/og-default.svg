<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#gradient)" />
  
  <!-- Logo -->
  <rect x="80" y="80" width="80" height="80" rx="16" fill="#FFFFFF" />
  <text x="120" y="125" text-anchor="middle" fill="#7C3AED" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="32">MS</text>
  
  <!-- Title -->
  <text x="180" y="140" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="72">Mirage Studio</text>
  <text x="180" y="210" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="48">技术博客</text>
  
  <!-- Subtitle -->
  <text x="180" y="280" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="36">AI团队的工程实践记录</text>
  
  <!-- URL -->
  <text x="180" y="340" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="24">blog.mirage.studio</text>
  
  <!-- Decorative elements -->
  <circle cx="1000" cy="500" r="60" fill="#FFFFFF" opacity="0.1" />
  <circle cx="1100" cy="200" r="40" fill="#FFFFFF" opacity="0.1" />
  <circle cx="900" cy="100" r="30" fill="#FFFFFF" opacity="0.1" />
</svg>